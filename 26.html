<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #wrapper {
            width: 800px;
            margin: 50px auto;
            border: 1px solid black;
        }

        #menu {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            background-color: orange;
        }

        #menu a {
            margin: 0 5px;
            padding: 15px 25px;
            text-decoration: none;
            color: #fff;
            font: bold 14px Arial;
        }

        #menu a:hover,
        #menu a:active {
            color: orange;
            background-color: #fff;
        }

        #content {
            padding: 0 30px 20px;
        }

        #content h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 10px;
            color: red;
        }

        #wrapper p {
            color: blue;
            padding: 0 10px;
            margin-bottom: 5px;
            font: 18px/1.3 Arial;
            text-align: justify;
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <div id="menu">
            <a href="#">link text 1</a>
            <a href="#" class="active">link text 1</a>
            <a href="#">link text 1</a>
            <a href="#">link text 1</a>
            <a href="#">link text 1</a>
        </div>
        <div id="content">
            <h1>Proin tristique lorem</h1>
        </div>
        <p>
            Текст.............

        </p>
        <p>
            Текст.............
        </p>
    </div>
</body>

</html>
