<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #menu {
            display: flex;
            flex-direction: column;
        }
        #menu a{
            width: 500px;
            height: 50px;
            margin-right: 5px;
            padding: 10px;
            font: 15px Arial;
            text-decoration: none;
            color: white;
            border: 1px solid green;
            background-color: green;
        }
        #menu a:hover, #menu a:active{
            color: green;
            border: 1px solid green;
            background-color: white;
        }
    </style>
</head>
<body>
    <div id="menu">
        <a href="#">home</a>
        <a href="#">blog</a>
        <a href="#">photos</a>
        <a href="#">about us</a>
        <a href="#">contacts</a>
    </div>
</body>
</html>
