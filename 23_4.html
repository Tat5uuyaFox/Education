<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .a{
            position: relative;
            margin: 10px auto;
            height: 500px;
            width: 500px;
            border-radius: 250px;
            border: 1px solid black;
            background-color: green;
        }
        .a1{
            position: absolute;
            height: 100px;
            width: 100px;
            left: 100px;
            top: 100px;
            border-radius:50px ;
            border: 1px solid black;
            background-color: white;
        }
        .a2{
            position: absolute;
            height: 100px;
            width: 100px;
            right: 100px;
            top: 100px;
            border-radius: 50px;
            border: 1px solid black;
            background-color: white;
        }
        .a3{
            position: absolute;
            height: 70px;
            width: 70px;
            top: 230px;
            left: 215px;
            border: 1px solid black;
            background-color: white;
        }
        .a4{
            position: absolute;
            height: 20px;
            width: 200px;
            bottom: 100px;
            left: 150px;
            border: 1px solid black;
            background-color: white;
        }
    </style>
</head>
<body>
    <div class="a">
        <div class="a1"></div>
        <div class="a2"></div>
        <div class="a3"></div>
        <div class="a4"></div>
    </div>
</body>
</html>
