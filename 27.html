<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         #wrapper {
            width: 1000px;
            margin: 30px auto;
            border: 1px solid black;
        }
       
        #header {
            height: 200px;
            padding: 20px;
            border: 1px solid black;
        }
        #footer {
            height: 200px;
            padding: 20px;
            border: 1px solid black;
        }
       
        * {
            box-sizing: border-box;
        }
        #container {
            display: flex;
        }
        #content {
            width: 780px;
            height: 700px;
            padding: 20px;
            border: 1px solid black;
        }
        #sidebar {
            width: 200px;
            margin-right: 20px;
            padding: 20px;
            border: 1px solid black;
        }

    </style>
</head>
<body>
    <div  id="wrapper">
        <div id="header">
            header
        </div>
        <div id="container">
        <div id="content">
            content
        </div>
        <div id="sidebar">
            sidebar
        </div>
        </div>
        <div id="footer">
            footer
        </div>
    </div>
    
</body>
</html>
