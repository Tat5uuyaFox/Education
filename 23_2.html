<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .a{
            position: relative;
            margin: 10px auto;
            width: 200px;
            height: 500px;
            border: 1px solid black;
        }
        .b{
            position: absolute;
            top: 50px;
            left: 50px;
            width: 100px;
            height: 100px;
            border-radius:50px ;
            border: 1px solid black;
            background-color: red;
        }
        .c{
            position: absolute;
            top: 200px;
            left: 50px;
            width: 100px;
            height: 100px;
            border-radius:50px ;
            border: 1px solid black;
            background-color: yellow;
        }
        .d{
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 100px;
            height: 100px;
            border-radius: 50px;
            border: 1px solid black;
            background-color: green;
        }
    </style>
</head>
<body>
    <div class="a">
        <div class="b"></div>
        <div class="c"></div>
        <div class="d"></div>
    </div>
    
</body>
</html>
